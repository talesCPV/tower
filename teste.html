    function circle(ang){

        const angle = ang +45
        const offset = 50
        const l = 50
        const h = 50
        const offset_ang = ((Math.atan2(l/2, h/2) * 180) / Math.PI) + 90

        const center = [offset+l/2,offset+h/2]
        const raio = Math.sqrt(Math.pow(l/2,2)+Math.pow(h/2,2))
        const sin = Number((Math.sin(Math.PI/180 * angle)).toFixed(2))
        const cos = Number((Math.cos(Math.PI/180 * angle)).toFixed(2))
        const cord = [center[0]+raio*cos, center[1]+raio*sin]

        const cnv = document.querySelector('#cnv')

        if (cnv.getContext) {
            ctx = cnv.getContext('2d')
            ctx.clearRect(0, 0, cnv.width, cnv.height)

            ctx.strokeRect(offset,offset, l, h)

            ctx.save();
            ctx.translate(cord[0],cord[1]);
            ctx.rotate(Math.PI / 180 * (angle + offset_ang))

            ctx.strokeRect(0,0, l, h)
            ctx.restore(); 


    // PONTEIRO
            ctx.beginPath()
            ctx.moveTo(center[0], center[1])
            ctx.lineTo(cord[0], cord[1])
            ctx.stroke()

        }
    }

    function drawWeapom(ang){

            const cnv = document.querySelector('#cnv')
            const base = new Image()
            base.src = 'assets/w_base.png'

            base.height = base.width


            const arm = new Image()
            arm.src = `assets/en_fast.png`

            const angle = ang +45
            const offset = 0
            const l = arm.width 
            const h = arm.height 
            const offset_ang = ((Math.atan2(l/2, h/2) * 180) / Math.PI) + 90
            const scale = cnv.width / base.width

            const center = [offset+l/2,offset+h/2]
            const raio = Math.sqrt(Math.pow(l/2,2)+Math.pow(h/2,2))
            const sin = Number((Math.sin(Math.PI/180 * angle)).toFixed(2))
            const cos = Number((Math.cos(Math.PI/180 * angle)).toFixed(2))
            const cord = [center[0]+raio*cos, center[1]+raio*sin]

    //console.log(l,h,scale,base.width,base.height,cnv.width,cnv.height )

            if (cnv.getContext) {
                ctx = cnv.getContext('2d');
                ctx.clearRect(0, 0, cnv.width, cnv.height)
    //            ctx.drawImage(base,offset,offset, base.width, base.height)
                ctx.save();
                ctx.scale(scale,scale)
                ctx.drawImage(base,offset,offset, base.width, base.height)
                ctx.translate(cord[0]+((base.width-l)/2),cord[1]+((base.height-h)/2));
                ctx.rotate(Math.PI / 180 * (angle + offset_ang))
                ctx.strokeRect(0,0, l, h)
                ctx.drawImage(arm,0,0, l, h);
                ctx.restore(); 
            }

        // PONTEIRO
            ctx.beginPath()
            ctx.moveTo(center[0], center[1])
            ctx.lineTo(cord[0], cord[1])
            ctx.stroke()

        }

        }

function getway(ini){
    const queue = [setObj(ini,0)]

    function setObj(pos,order, parent=null){
        const out = new Object
        out.parent = parent
        out.order = order
        out.pos = pos
        return out
    }

    function free(pos){
        return game.board[pos[0]][pos[1]].id < 0 ? 1 : 0
    }

    function has(pos){
        for(let i=0; i<queue.length; i++){
            if(queue[i].pos[0] == pos[0] && queue[i].pos[1] == pos[1]){
                return 1
            }
        }
        return 0
    }

    function ending(pos){
        return game.gate.some(arr => arr.length === pos.length && arr.every((val, i) => val === pos[i]))
    }

    function getWayBack(){
        const path = [queue[queue.length-1]]
        for(let i=queue.length-2; i>=0; i--){
            if(JSON.stringify(path[path.length-1].parent)==JSON.stringify(queue[i].pos)){
                path.push(queue[i])
            }
        }
        return path
    }

    function neighbors(pos){
        const out = []
        for(let i=0; i<4; i++){
            try{
                const y = i<2  ? i%2 ? pos[0]-1 : pos[0]+1  : pos[0]
                const x = i>=2 ? i%2 ? pos[1]-1 : pos[1]+1  : pos[1]
                if(!has([y,x]) && free([y,x])){
                    out.push([y,x])
                }
            }catch{null}
        }
        return out
    }

    let p=0
    while(p<queue.length){
        const ngb = neighbors(queue[p].pos)
        for(let i=0; i<ngb.length; i++){
            const next = setObj(ngb[i],queue[p].order+1,queue[p].pos)
            queue.push(next)
            if(ending(ngb[i])){
                return getWayBack()
            }
        }
        p++
    }

    return []
}

const game = new Object
const player = new Enemy()

        function createField(){
            game.square = 20

            const gnd = document.querySelector('.ground')
            gnd.innerHTML = ''
            game.board=[]
            for(let y=0; y<game.square; y++){
                const line = document.createElement('div')
                line.className = 'line'
                gnd.appendChild(line)
                game.board.push([])
                for(let x=0; x<game.square; x++){
                    const rand =  Math.floor(Math.random()*2)
                    const obj = new Object
                    obj.id = rand ? 1 : -1

                    game.board[game.board.length-1].push(obj)
                    const cel = document.createElement('div')
                    cel.className = 'cell'
                    rand ? cel.classList.add('fill') : null
                    cel.id = `cel-${y}-${x}`
                    line.appendChild(cel)

                    const gt = Math.floor(game.square/2)
                    game.gate = [[gt-1,game.square-1],[gt,game.square-1],[gt+1,game.square-1]]

                    if([gt-1,gt,gt+1].includes(y)){
                        if([0,game.square-1].includes(x)){
                            cel.classList.add('gate')
                            cel.classList.remove('fill')
                            game.board[y][x].id = -1
                        }
                    }

                    cel.addEventListener('click',()=>{
                        if(document.querySelector('#clear').checked){

                            if(game.board[y][x].id < 0 && !cel.classList.contains('gate')){
                                cel.classList.add('fill')
                                game.board[y][x].id = 1
                            }else{
                                cel.classList.remove('fill')
                                game.board[y][x].id = -1
                            }

                        }else{
                            console.log(game.board[y][x].id)
                        }
                    })

                }
            }
            console.log(game)
        }

    document.querySelector('#run').addEventListener('click',()=>{
        const bestway = getway([player.y,player.x])
        for(let y=0; y<game.board.length; y++){
            for(let x=0; x<game.board[y].length; x++){
                document.querySelector(`#cel-${y}-${x}`).classList.remove('path')
            }
        }

        for(let i=0; i<bestway.length; i++){
            document.querySelector(`#cel-${bestway[i].pos[0]}-${bestway[i].pos[1]}`).classList.add('path')
        }

    })

    document.querySelector('#clean').addEventListener('click',()=>{
        clear()
    })
