    function circle(ang){

        const angle = ang +45
        const offset = 50
        const l = 50
        const h = 50
        const offset_ang = ((Math.atan2(l/2, h/2) * 180) / Math.PI) + 90

        const center = [offset+l/2,offset+h/2]
        const raio = Math.sqrt(Math.pow(l/2,2)+Math.pow(h/2,2))
        const sin = Number((Math.sin(Math.PI/180 * angle)).toFixed(2))
        const cos = Number((Math.cos(Math.PI/180 * angle)).toFixed(2))
        const cord = [center[0]+raio*cos, center[1]+raio*sin]

        const cnv = document.querySelector('#cnv')

        if (cnv.getContext) {
            ctx = cnv.getContext('2d')
            ctx.clearRect(0, 0, cnv.width, cnv.height)

            ctx.strokeRect(offset,offset, l, h)

            ctx.save();
            ctx.translate(cord[0],cord[1]);
            ctx.rotate(Math.PI / 180 * (angle + offset_ang))

            ctx.strokeRect(0,0, l, h)
            ctx.restore(); 


    // PONTEIRO
            ctx.beginPath()
            ctx.moveTo(center[0], center[1])
            ctx.lineTo(cord[0], cord[1])
            ctx.stroke()

        }
    }

    function drawWeapom(ang){

            const cnv = document.querySelector('#cnv')
            const base = new Image()
            base.src = 'assets/w_base.png'

            base.height = base.width


            const arm = new Image()
            arm.src = `assets/en_fast.png`

            const angle = ang +45
            const offset = 0
            const l = arm.width 
            const h = arm.height 
            const offset_ang = ((Math.atan2(l/2, h/2) * 180) / Math.PI) + 90
            const scale = cnv.width / base.width

            const center = [offset+l/2,offset+h/2]
            const raio = Math.sqrt(Math.pow(l/2,2)+Math.pow(h/2,2))
            const sin = Number((Math.sin(Math.PI/180 * angle)).toFixed(2))
            const cos = Number((Math.cos(Math.PI/180 * angle)).toFixed(2))
            const cord = [center[0]+raio*cos, center[1]+raio*sin]

    //console.log(l,h,scale,base.width,base.height,cnv.width,cnv.height )

            if (cnv.getContext) {
                ctx = cnv.getContext('2d');
                ctx.clearRect(0, 0, cnv.width, cnv.height)
    //            ctx.drawImage(base,offset,offset, base.width, base.height)
                ctx.save();
                ctx.scale(scale,scale)
                ctx.drawImage(base,offset,offset, base.width, base.height)
                ctx.translate(cord[0]+((base.width-l)/2),cord[1]+((base.height-h)/2));
                ctx.rotate(Math.PI / 180 * (angle + offset_ang))
                ctx.strokeRect(0,0, l, h)
                ctx.drawImage(arm,0,0, l, h);
                ctx.restore(); 
            }

        // PONTEIRO
            ctx.beginPath()
            ctx.moveTo(center[0], center[1])
            ctx.lineTo(cord[0], cord[1])
            ctx.stroke()

        }

/*  PATH WAY  */

class Enemy{
    constructor(direct = 'h'){        
        this.y = 4+Math.floor(Math.random()*3)
        this.x = 0
        this.path = []
        this.direct = direct
        this.gates = this.direct == 'h' ? [[4,9],[5,9],[6,9]] : [[9,4],[9,5],[9,6]]
    }
}

Enemy.prototype.getWay = function(){
    const way = new Object
    way.path = []
    way.pos = []
    way.gates = this.gates


    function free(pos){
        return game.board[pos[0]][pos[1]].id < 0 ? 1 : 0
    }

    function exit(pos){
        const out = []
        for(let i=0; i<4; i++){
            try{
                const y = i<2  ? i%2 ? pos[0]-1 : pos[0]+1  : pos[0]
                const x = i>=2 ? i%2 ? pos[1]-1 : pos[1]+1  : pos[1]
                if(free([y,x])){
                    out.push([y,x])
                }
            }catch{
//                console.log('out of borders!')
            }
        }

        if(player.gates[0][0] < player.gates[0][1]){
            out.sort((a, b) => b[1] - a[1]); 
        }else{
            out.sort((a, b) => b[0] - a[0]); 
        }
        return out
    }

    function makeway(pos){
        const ext = exit(pos[pos.length-1])
        
        for(let i=0; i<ext.length; i++){
            if(pos.some(arr => arr.length === ext[i].length && arr.every((val, j) => val === ext[i][j]))){
                ext.splice(i,1)
                i--
            }else{
                if(way.gates.some(arr => arr.length === ext[i].length && arr.every((val, j) => val === ext[i][j]))){
                    const nw_array = JSON.parse(JSON.stringify(pos))
                    nw_array.push(ext[i])
                    way.path = !way.path.length || nw_array.length < way.path.length ? nw_array : way.path
                    return
                }
            }
        }

        if(ext.length){
            for(let i=0; i<ext.length; i++){
                const nw_array = JSON.parse(JSON.stringify(pos))
                nw_array.push(ext[i])
                if(!way.path.length || way.path.length > nw_array.length){
                    makeway(nw_array)
                }
            }
        }

    }

    way.paths = []

    makeway([[this.y,this.x]])

    console.log(way.path)

}

const game = new Object
const player = new Enemy()

        function createField(){
            const gnd = document.querySelector('.ground')
            gnd.innerHTML = ''
            game.board=[]
            for(let y=0; y<10; y++){
                const line = document.createElement('div')
                line.className = 'line'
                gnd.appendChild(line)
                game.board.push([])
                for(let x=0; x<10; x++){
                    const rand =  Math.floor(Math.random()*2)
                    const obj = new Object
                    obj.id = rand ? 1 : -1

                    game.board[game.board.length-1].push(obj)
                    const cel = document.createElement('div')
                    cel.className = 'cell'
                    rand ? cel.classList.add('fill') : null
                    cel.id = `cel-${y}-${x}`
                    line.appendChild(cel)

                    if([4,5,6].includes(y)){
                        if([0,9].includes(x)){
                            cel.classList.add('gate')
                            cel.classList.remove('fill')
                            game.board[y][x].id = -1
                        }
                    }

                    cel.addEventListener('click',()=>{
                        if(document.querySelector('#clear').checked){

                            if(game.board[y][x].id < 0 && !cel.classList.contains('gate')){
                                cel.classList.add('fill')
                                game.board[y][x].id = 1
                            }else{
                                cel.classList.remove('fill')
                                game.board[y][x].id = -1
                            }

                        }else{
                            console.log(game.board[y][x].id)
                        }
                    })

                }
            }
            console.log(game)
        }
